<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Side Effects Magazine</title>
  <meta name="description" content="An open-source publication exploring frontier technologies and their cultural n^th-order side effects — read it as a terminal." />

  <!-- Open Graph -->
  <meta property="og:title" content="Side Effects Magazine" />
  <meta property="og:description" content="An open-source publication exploring frontier technologies and their cultural n^th-order side effects — the website is the CLI." />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --bg: #adf7f7;
      --fg: #0b3a3a;
      --accent: #075e5e;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, "Cascadia Mono", Consolas, "Liberation Mono", monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: var(--font-mono);
      font-size: clamp(13px, 12px + 0.2vw, 15px);
      line-height: 1.55;
      padding: clamp(1rem, 3vw, 2.75rem);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #screen { max-width: 880px; margin: 0 auto; }

    #out, .line { white-space: pre-wrap; overflow-wrap: anywhere; }
    .blk { margin: 0; }

    .logo { font-weight: 700; letter-spacing: 0.04em; }
    .dim { opacity: 0.55; }
    .err { font-weight: 700; }
    b { font-weight: 700; }
    i { font-style: italic; }

    /* clickable command / external links */
    .lnk, .ext { color: inherit; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }
    .lnk:hover, .ext:hover { opacity: 0.6; }
    .lnk:focus-visible, .ext:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }

    /* inline code + fenced code in rendered articles */
    .ic { padding: 0 0.3ch; background: color-mix(in srgb, var(--fg) 12%, transparent); border-radius: 2px; }
    .code { display: block; border-left: 2px solid var(--fg); padding: 0.1em 0 0.1em 1.2ch; margin: 0.4em 0; opacity: 0.92; }
    .h1, .h2 { font-weight: 700; }

    /* live prompt */
    #form.line { display: flex; align-items: baseline; flex-wrap: wrap; margin-top: 0.2em; }
    .pr { font-weight: 700; color: var(--accent); margin-right: 0.6ch; white-space: nowrap; }
    #input {
      flex: 1; min-width: 4ch;
      border: 0; padding: 0; margin: 0;
      background: transparent; color: transparent; caret-color: transparent;
      font: inherit; outline: none;
    }
    .cur {
      align-self: center; width: 0.55ch; height: 1.15em;
      background: var(--fg);
      animation: blink 1.05s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) { .cur { animation: none; } }
  </style>
</head>
<body>
  <main id="screen">
    <div id="out"></div>
    <form id="form" class="line" autocomplete="off">
      <span class="pr">side-effects-mag&nbsp;$</span><span id="mirror"></span><span class="cur" aria-hidden="true"></span>
      <input id="input" aria-label="Command input" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
    </form>
  </main>

  <script>
  const FEED_URL = "https://raw.githubusercontent.com/1999labs/side-effects-mag/main/feed.json";
  const REPO_URL = "https://github.com/1999labs/side-effects-mag";

  const out = document.getElementById("out");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const mirror = document.getElementById("mirror");

  let ARTICLES = [];
  const BY_ID = new Map();
  const cmdHistory = [];
  let histPos = 0;
  let lastEcho = null;

  boot();

  async function boot() {
    print('<span class="logo">SIDE EFFECTS // MAGAZINE</span>\n<span class="dim">an open-source publication — terminal client v1</span>\n');
    try {
      const res = await fetch(FEED_URL, { cache: "no-cache" });
      if (!res.ok) throw new Error("feed.json " + res.status);
      const feed = await res.json();
      ARTICLES = (feed.articles || []).slice().sort((a, b) => a.id - b.id);
      ARTICLES.forEach((a) => BY_ID.set(String(a.id), a));
      print('Loaded ' + ARTICLES.length + ' issues. Type ' + lnk("help") + ' or try ' + lnk("latest") + '.\n');
    } catch (e) {
      print('<span class="err">Could not load feed.json: ' + esc(String(e.message || e)) + "</span>");
    }
    focusInput();
  }

  // ── command loop ─────────────────────────────────────────────────────────

  function run(raw) {
    const line = (raw || "").trim();
    echo(line);
    if (line) { cmdHistory.push(line); histPos = cmdHistory.length; }

    const parts = line.split(/\s+/);
    const name = (parts[0] || "").toLowerCase();
    const arg = parts[1];

    switch (name) {
      case "": break;
      case "help": case "?": help(); break;
      case "latest": list(3); break;
      case "ls": case "list": case "issues": list(0); break;
      case "read": case "open": return read(arg); // async; handles its own scroll
      case "subscribe": subscribe(); break;
      case "api": api(); break;
      case "about": about(); break;
      case "clear": case "cls": out.innerHTML = ""; break;
      default:
        print('<span class="err">command not found: ' + esc(name) + "</span>\nType " + lnk("help") + " for a list.");
    }
    scrollToPrompt();
  }

  function help() {
    print(
      "Commands\n" +
      "  " + lnk("latest") + "            the 3 most recent issues\n" +
      "  " + lnk("ls", "ls") + "                the full archive\n" +
      "  " + lnk("read 003", "read &lt;id&gt;") + "         read an issue here (e.g. " + lnk("read 003", "read 003") + ")\n" +
      "  " + lnk("subscribe") + "         how to subscribe\n" +
      "  " + lnk("api") + "               the JSON API endpoints\n" +
      "  " + lnk("about") + "             what this is\n" +
      "  " + lnk("clear", "clear") + "             clear the screen\n" +
      '\n<span class="dim">↑/↓ recall commands · this page mirrors npx side-effects-mag</span>'
    );
  }

  function list(n) {
    if (!ARTICLES.length) { print("no issues found"); return; }
    const items = ARTICLES.slice().reverse();
    const shown = n ? items.slice(0, n) : items;
    let s = "";
    shown.forEach((a) => {
      const id = String(a.id).padStart(3, "0");
      s += "  " + lnk("read " + a.id, id) + "  " + pad(a.title, 26) + " " +
           pad(a.read_time || "", 6) + "  " + '<span class="dim">' + esc((a.tags || []).join(", ")) + "</span>\n";
    });
    if (n && items.length > n) s += '<span class="dim">  …' + (items.length - n) + " more — type " + lnk("ls", "ls") + "</span>\n";
    print(s);
  }

  async function read(idArg) {
    if (!idArg) { print("usage: read &lt;id&gt;   e.g. " + lnk("read 003", "read 003")); scrollToPrompt(); return; }
    const a = BY_ID.get(String(parseInt(idArg, 10))) || BY_ID.get(idArg);
    if (!a) { print('<span class="err">no issue "' + esc(idArg) + '"</span> — try ' + lnk("ls", "ls")); scrollToPrompt(); return; }
    const loading = print('<span class="dim">fetching ' + esc(a.slug) + "…</span>");
    try {
      const res = await fetch(a.canonical_url, { cache: "no-cache" });
      if (!res.ok) throw new Error(String(res.status));
      loading.remove();
      print(renderArticle(stripFront(await res.text()), a));
    } catch (e) {
      print('<span class="err">failed to fetch: ' + esc(String(e.message || e)) + "</span>");
    }
    if (lastEcho) lastEcho.scrollIntoView({ block: "start", behavior: "smooth" });
  }

  function subscribe() {
    const url = "https://buttondown.email/sideeffects";
    print(
      "Subscribe by email\n  " + ext(url) + "\n\n" +
      "Or from your own shell\n  " + '<span class="ic">npx side-effects-mag subscribe</span>'
    );
  }

  function api() {
    print(
      "Side Effects is a JSON API — no auth, no rate limit beyond GitHub's.\n\n" +
      "  " + '<span class="ic">GET ' + esc(FEED_URL) + "</span>\n" +
      "  " + '<span class="ic">GET …/articles/{slug}.md</span>\n\n' +
      '<span class="dim">This terminal is just another client of that feed.</span>'
    );
  }

  function about() {
    print(
      '<span class="logo">SIDE EFFECTS MAGAZINE</span>\n' +
      "An open-source publication exploring frontier technologies and cultural\n" +
      "nth-order side effects. The repo is the magazine — " + ext(REPO_URL, "github.com/1999labs/side-effects-mag")
    );
  }

  // ── article → terminal text ───────────────────────────────────────────────

  function renderArticle(md, a) {
    const lines = md.replace(/\r\n/g, "\n").split("\n");
    const meta = [a.published, (a.tags || []).join(" · "), a.read_time ? a.read_time + " read" : ""].filter(Boolean).join("    ");
    let html = '<span class="dim">' + esc(meta) + "</span>\n";
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      if (/^```/.test(line)) {
        i++;
        let code = "";
        while (i < lines.length && !/^```/.test(lines[i])) code += lines[i++] + "\n";
        i++;
        html += '<span class="code">' + esc(code.replace(/\n$/, "")) + "</span>\n";
        continue;
      }
      if (/^---+\s*$/.test(line)) { html += '<span class="dim">' + rule(44) + "</span>\n"; i++; continue; }
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) {
        const t = h[2].trim();
        if (h[1].length === 1) html += '\n<span class="h1">' + inl(esc(t.toUpperCase())) + "</span>\n" + '<span class="dim">' + heavy(Math.min(t.length, 46)) + "</span>\n";
        else html += '\n<span class="h2">' + inl(esc(t)) + "</span>\n" + '<span class="dim">' + rule(Math.min(t.length, 46)) + "</span>\n";
        i++; continue;
      }
      if (/^\s*[-*]\s+/.test(line)) { html += "  • " + inl(esc(line.replace(/^\s*[-*]\s+/, ""))) + "\n"; i++; continue; }
      const ol = line.match(/^\s*(\d+)\.\s+(.*)/);
      if (ol) { html += "  " + ol[1] + ". " + inl(esc(ol[2])) + "\n"; i++; continue; }
      if (/^\s*$/.test(line)) { html += "\n"; i++; continue; }
      let para = line; i++;
      while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6}\s|```|---+\s*$|\s*[-*]\s+|\s*\d+\.\s+)/.test(lines[i])) para += " " + lines[i++];
      html += inl(esc(para)) + "\n";
    }
    return html;
  }

  // inline markdown on already-escaped text (code spans placeheld with U+E000)
  function inl(t) {
    const codes = [];
    const S = "\u0001"; // sentinel — cannot occur in article text
    t = t.replace(/`([^`]+)`/g, function (_, c) { codes.push(c); return S + (codes.length - 1) + S; });
    t = t.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function (_, x, u) { return '<a class="ext" href="' + u + '" target="_blank" rel="noopener">' + x + "</a>"; });
    t = t.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
    t = t.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<i>$2</i>");
    t = t.replace(new RegExp(S + "(\\d+)" + S, "g"), function (_, n) { return '<span class="ic">' + codes[+n] + "</span>"; });
    return t;
  }

  function stripFront(md) {
    const ls = md.replace(/\r\n/g, "\n").split("\n");
    const h = ls.slice(0, 8).findIndex(function (l) { return /^---+\s*$/.test(l); });
    return h === -1 ? md : ls.slice(h + 1).join("\n").trim();
  }

  // ── plumbing ──────────────────────────────────────────────────────────────

  function print(html) {
    const div = document.createElement("div");
    div.className = "blk";
    div.innerHTML = html;
    out.appendChild(div);
    return div;
  }
  function echo(cmd) {
    lastEcho = print('<span class="pr">side-effects-mag $</span> ' + esc(cmd));
  }
  function scrollToPrompt() { window.scrollTo({ top: document.body.scrollHeight }); }
  function focusInput() { input.focus(); }

  function lnk(cmd, label) { return '<a class="lnk" data-cmd="' + esc(cmd) + '" tabindex="0">' + (label || esc(cmd)) + "</a>"; }
  function ext(url, label) { return '<a class="ext" href="' + esc(url) + '" target="_blank" rel="noopener">' + (label || esc(url)) + "</a>"; }
  function pad(s, n) { s = String(s); return s.length >= n ? s.slice(0, n - 1) + "…" : s + " ".repeat(n - s.length); }
  function rule(n) { return "─".repeat(n); }
  function heavy(n) { return "═".repeat(n); }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  // ── events ────────────────────────────────────────────────────────────────

  input.addEventListener("input", function () { mirror.textContent = input.value; });

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    const v = input.value;
    input.value = "";
    mirror.textContent = "";
    run(v);
  });

  input.addEventListener("keydown", function (e) {
    if (e.key === "ArrowUp") {
      if (!cmdHistory.length) return;
      e.preventDefault();
      histPos = Math.max(0, histPos - 1);
      input.value = cmdHistory[histPos] || "";
      mirror.textContent = input.value;
    } else if (e.key === "ArrowDown") {
      if (!cmdHistory.length) return;
      e.preventDefault();
      histPos = Math.min(cmdHistory.length, histPos + 1);
      input.value = cmdHistory[histPos] || "";
      mirror.textContent = input.value;
    }
  });

  // click a suggested command to run it; click anywhere else to focus the prompt
  document.addEventListener("click", function (e) {
    const c = e.target.closest(".lnk");
    if (c) { e.preventDefault(); run(c.getAttribute("data-cmd")); focusInput(); return; }
    if (!e.target.closest("a") && !window.getSelection().toString()) focusInput();
  });
  // keyboard activation for suggested commands
  document.addEventListener("keydown", function (e) {
    if (e.key !== "Enter" && e.key !== " ") return;
    const c = e.target.closest && e.target.closest(".lnk");
    if (!c) return;
    e.preventDefault();
    run(c.getAttribute("data-cmd"));
    focusInput();
  });
  </script>
</body>
</html>
